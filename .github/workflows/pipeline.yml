name: ML Pipeline

on: [push]

jobs:

  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Train model
        run: python train.py

      - name: Save Run ID
        run: cat run_id.txt > model_info.txt

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: model-info
          path: |
            model_info.txt
            accuracy.txt

  deploy:
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: model-info

      - name: Check accuracy
        run: python check_threshold.py

      - name: Build Docker
        run: |
          echo "Building Docker image for Run ID: $(cat model_info.txt)"